# Würzburg Web Week has no public ICS/RSS feed — it is not a Meetup group (the former
# meetup.com/Wuerzburg-Web-Week/events/ical/ returned 404 "Group not found"). Its program runs
# under AI Week Mainfranken (wueww.de → ai-week.de), already covered by the AI-Week adapter, so a
# dedicated feed entry is intentionally omitted here. Verified 2026-06-26.

# --- Broad calendars (mixed content → broad=true, keyword gate on) ------------------------------
- name: frizz_wuerzburg
  type: rss
  url: https://frizz-wuerzburg.de/search/event/veranstaltungskalender/index.rss
  organizer: "FRIZZ Würzburg"
  tags: [frizz, stadtkalender]
