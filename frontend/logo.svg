<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Event Radar">
  <defs>
    <linearGradient id="sweep" x1="24" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b8324f" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#b8324f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#36c5a0"/>
      <stop offset="1" stop-color="#36c5a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(8,8)">
    <rect width="48" height="48" rx="13" fill="#1d2530"/>
    <!-- rings -->
    <g fill="none" stroke="#38414f" stroke-width="1.4">
      <circle cx="24" cy="24" r="16"/>
      <circle cx="24" cy="24" r="10.5"/>
      <circle cx="24" cy="24" r="5"/>
    </g>
    <!-- crosshair -->
    <g stroke="#2c3543" stroke-width="1.2">
      <line x1="8" y1="24" x2="40" y2="24"/>
      <line x1="24" y1="8" x2="24" y2="40"/>
    </g>
    <!-- sweep wedge -->
    <path d="M24 24 L24 8 A16 16 0 0 1 37.86 16 Z" fill="url(#sweep)"/>
    <!-- detected blip (glow + dot) -->
    <circle cx="33" cy="14" r="6" fill="url(#blip)"/>
    <circle cx="33" cy="14" r="2.4" fill="#36c5a0"/>
    <!-- faint second blip -->
    <circle cx="15.5" cy="30" r="1.8" fill="#36c5a0" fill-opacity="0.55"/>
    <!-- center -->
    <circle cx="24" cy="24" r="2.3" fill="#b8324f"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(70,0)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
    <text x="0" y="34" font-size="23" font-weight="800" letter-spacing="-0.5" fill="#1d2530">Event</text>
    <text x="66" y="34" font-size="23" font-weight="800" letter-spacing="-0.5" fill="#b8324f">Radar</text>
    <text x="1" y="50" font-size="10.5" font-weight="600" letter-spacing="2.4" fill="#9aa3b0">MAINFRANKEN</text>
  </g>
</svg>
