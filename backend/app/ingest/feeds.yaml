# FrankenJS regional group (Franconia's JS user group, Würzburg + Nuremberg). Parent of the
# front-end-wuerzburg chapter above; Würzburg-area talks are announced here too. Valid ICS, verified
# 2026-06-26 (currently between events — same seasonal state as the other Meetup feeds; out-of-radius
# Nuremberg dates get dropped by the ingest geo gate). The 4 Würzburg groups above are the region's
# only other active tech Meetups (all other plausible slugs return 404).
- name: meetup_frankenjs
  type: ics
