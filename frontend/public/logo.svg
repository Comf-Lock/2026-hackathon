<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="Event Radar">
  <defs>
    <linearGradient id="sweep" x1="24" y1="8" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36c5a0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#36c5a0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="blip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5fe0bd"/>
      <stop offset="1" stop-color="#5fe0bd" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- mark: brand-accent — radar rings glow in teal so the scope reads as "live" -->
  <g transform="translate(8,8)">
    <rect width="48" height="48" rx="13" fill="#16201d"/>
    <!-- rings: lit teal, brightening inward, softly glowing -->
    <g fill="none" stroke="#36c5a0" stroke-width="1.6" filter="url(#glow)">
      <circle cx="24" cy="24" r="16" stroke-opacity="0.5"/>
      <circle cx="24" cy="24" r="10.5" stroke-opacity="0.75"/>
      <circle cx="24" cy="24" r="5" stroke-opacity="1"/>
    </g>
    <!-- crosshair: dim teal, present but not competing with the rings -->
    <g stroke="#2f7d68" stroke-width="1.1">
      <line x1="8" y1="24" x2="40" y2="24"/>
      <line x1="24" y1="8" x2="24" y2="40"/>
    </g>
    <!-- sweep wedge (teal to match the lit scope) -->
    <path d="M24 24 L24 8 A16 16 0 0 1 37.86 16 Z" fill="url(#sweep)"/>
    <!-- detected blip (glow + dot) -->
    <circle cx="33" cy="14" r="6" fill="url(#blip)"/>
    <circle cx="33" cy="14" r="2.4" fill="#7defca"/>
    <!-- faint second blip -->
    <circle cx="15.5" cy="30" r="1.8" fill="#7defca" fill-opacity="0.6"/>
    <!-- center: brand rosé keeps the two-colour identity -->
    <circle cx="24" cy="24" r="2.4" fill="#b8324f"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(70,0)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
    <text x="0" y="34" font-size="23" font-weight="800" letter-spacing="-0.5" fill="#1d2530">Event</text>
    <text x="66" y="34" font-size="23" font-weight="800" letter-spacing="-0.5" fill="#b8324f">Radar</text>
    <text x="1" y="50" font-size="10.5" font-weight="600" letter-spacing="2.4" fill="#9aa3b0">MAINFRANKEN</text>
  </g>
</svg>
