# Data-driven feed registry — the RSS/ICS input channel.
#
# Each entry registers a generic ICSFeedAdapter / RSSFeedAdapter at ingest time, so adding a feed
# is a config edit, not a code change (see feed_loader.py). These were previously hardcoded
# `register(...)` calls in adapters/ics.py and adapters/rss.py.
#
# Schema per feed:
#   name:          unique adapter id → becomes EventSource.source_adapter   (required)
#   type:          ics | rss                                                (required)
#   url:           feed URL (single)                                        (required)
#   urls:          [..] multiple ICS calendar URLs (ics only, alt. to url)  (optional)
#   organizer:     default organizer when the feed entry omits one          (optional)
#   tags:          default tags merged onto every event from this feed      (optional)
#   default_city:  city assumed for non-online events lacking one           (optional)
#   trust_tier:    1=high (institution) … 3=low                             (default 2)
#   broad:         true → core applies the IT-keyword gate (mixed calendars) (default false)
#   prefer_title_date: rss only — read the event date from the item title    (default false)
#
# ZdiGenIcsAdapter stays a code adapter (discovery + per-event ICS) — deliberately not here.

# --- Meetup group calendars (IT-native → broad=false, no keyword gate) -------------------------
- name: meetup_wue_data
  type: ics
  url: https://www.meetup.com/wurzburg-data-analytics-meetup/events/ical/
  organizer: "Würzburg Data & Analytics Meetup"
  tags: [meetup, data, analytics]
  default_city: Würzburg
  trust_tier: 2
  broad: false

