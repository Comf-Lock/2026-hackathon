services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: eventradar
      POSTGRES_PASSWORD: eventradar
      POSTGRES_DB: eventradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventradar"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      # Inside the compose network the DB host is "db", not localhost.
      DATABASE_URL: postgresql+psycopg://eventradar:eventradar@db:5432/eventradar
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
